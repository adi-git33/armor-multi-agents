# Host ports are overridable when 8000/3000 are taken by something else:
#   ARMOR_BACKEND_PORT=8100 ARMOR_FRONTEND_PORT=3100 docker compose up --build
# (--build matters when changing the backend port: the browser-facing origin
# is baked into the frontend bundle at build time.)
services:
  backend:
    build: ./backend
    ports:
      - "${ARMOR_BACKEND_PORT:-8000}:8000"
    # Persist the live dashboard's cumulative detection tally across
    # container restarts (same file the bare-metal server uses).
    volumes:
      - ./backend/models/aca_metrics.json:/app/models/aca_metrics.json

  frontend:
    build:
      context: ./frontend
      args:
        # The browser (not the container) connects to the backend, so
        # this must be the host-reachable origin.
        VITE_BACKEND_ORIGIN: http://localhost:${ARMOR_BACKEND_PORT:-8000}
    ports:
      - "${ARMOR_FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
